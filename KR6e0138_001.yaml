body:
  text: 解空法師述通論事苑伸贊金剛般若其書禪教無用士庶莫取中間詆訿先覺義似未安因考其説遂效明教禪師作非韓三十篇以辨之然非愛惡相攻執情偏尚志欲法門流布共贊大猷苟或不然唯聖可矚耳時淳熙戊戌解制後一日姑蘇寶幢蘭若比丘善喜敘金剛通論序分或直從事或直從法若直從事如此經舍衛國祇樹給孤獨園也或直從法如圓覺神通大光明藏也他宗諸經或在淨土説或在穢土説土既不同身亦有異在淨土説切恐未然但事法不同隨機所見非曰或直從事或直從法不知何所憑據良由未間經論故使然也今略舉淨土數經令其自曉深密解脫經云如是我聞一時婆伽婆住法界殿如來境界處又解深密經薄伽梵住最勝光曜七寶莊嚴放大光明普照一切無邊法界又法集經婆伽婆在虗空界法界無差別住處稱讚大乘經薄伽梵住法界藏諸佛所行大功德殿又密嚴經云一時佛出過欲色無色無想一切法自在無礙等然淨土總有十五本法集經大毗盧經入印法門經方等王經心印經興顯經圓覺經佛地經更有餘本在別卷中不録並無人間山城國邑等處卻云事法不同隨機所見圭峯曰粗心識淺者未免於此等經或謗或疑故佛地論親光菩薩具有通釋但曉此論自反三隅論曰受用變化二土中今此淨土何土所攝有義此土變化土攝佛為地前等令其欣樂修因暫化作淨土加衆暫見有義此土受用土攝此淨土量無邊際故論自反破初義云若暫加衆令見應如餘經分明顯説如法華三變淨土淨名足指按地經文皆云佛神力等今圓覺等經不言佛力何言暫化云在淨土説切恐未然者得非寡聞乎今引親光為定量可破疑情以斷封執也若以經論明言而謂之未然者何乃刻畫無鹽唐突西施也圭峯纂要雖前以持鉢乞食為戒敷坐而坐為定正宗説法為慧因戒生定由定發慧三學倫次故先乞食然大小經皆應乞食以為發起不勝通漫今謂佛意將説發心修無住相布施故先食時入城而行乞食須知世尊乞食欲令衆生成就檀波羅蜜故如來涅槃受純陀供養云我今受汝最後供養令汝具足檀波羅蜜非曰彼云乞食欲令衆生成就檀波羅蜜非謂持戒經云執持應器以乞自活馬鳴曰及自調伏故調伏即戒也又經云依因此戒得生諸禪定及滅苦智慧今著衣持鉢乞食威儀離於邪命得非持戒乎又云不勝通漫者彼不許持戒配發起以大小經皆有三學故殊不曉通別之序別序經經各別如法華以放光淨名以獻蓋今經以乞食若謂通漫豈皆配三學耶又引下文無住相布施故先乞食發起為檀度者涅槃下文受純陀供養具足檀波羅蜜亦應例涅槃發起序中出大音聲為檀度耶彼若不可此云何然別譯中間加問云何修行什譯略之淨覺疏云住約始習修行約積行住兼積行及以始習故什師刪之今謂住即所依也修行即能依也什師意高所依言住必兼能依所修之行故略修行但存其住能住般若必有照用必斷煩惱煩惱無非清淨般若煩惱無性即降伏義此經發心修無住相布施能住般若降伏煩惱所問能答到此畢矣非曰淨覺云住約始習修行約積行住兼積行及乎始習什師何以刪去積行獨留始習何不用積行攝乎始習却用始習兼於積行良恐未然今謂住即所依修行即能依所依言住必兼能依所修之行者此亦摹拓淨覺初無異論又何以得知所依之住必兼修行若慈恩天台賢首諸大聖師欲立一義必引聖教為衡量今無所據得非𮌎臆乎若圭峯出秦譯略修行者意云住道降伏即是修行謂四心六度皆名住修降伏故無著云住謂欲願修行謂相應等持降伏謂彼心若散制令還住又十八住中一一皆以住修降伏釋之故知義雖有三而行是一問何以下文但舉降心耶答義雖互攝文從勝顯然經宗於離相離相正是降心本意欲明降心因約住修以顯儻有公論宜從正轍凡六舉七寶布施又兩舉身命布施前後校量意雖漸引皆不可以前後淺深多少難易求之但隨當文所説顯示為校量本耳非曰先儒有言曰知之言知之不知言不知是知也不應以未至蓋人若但顯示為校量本不以前後淺深求之何必天親第三疑單以一重校量第七疑却用兩重校量第十疑只用內財一重校量等則知經論深意非公所謂也圭峯纂要云無著云是福德者標牒即非者約勝義空是故者約世俗有檢論無文淨覺疏云即非者事福本空也是故者雖空而假也今問即非福德性若已是勝義空即畢竟空義下文持經為説何所勝之雖有天辨亦弗能救一槩以即非為遣蕩之辭更不顧後有所勝者請從彌勒偈云天親論釋方合經旨偈云受持法及説不空於福德福不趣菩提二能趣菩提天親論釋云是福德聚即非福德聚聚即多也偈言福不趣菩提二能趣菩提故彼福德不趣大菩提二能趣大菩提一者受持二者為説須知此之非字乃揀去之辭揀去住相布施福德不趣大菩提故故云即非云云從來學者徒仰二老大手高風殊不契勘判此公案自有祖子歸源偈文全憑論釋不取臆論非曰彼用無著論釋經及乎圭峯引無著論而云檢論無文今引無著之文則使學者皂白自分矣無著云下此引七種義句中第五不失中文經初句是標牒經次句即論云若福聚非聚此遮增益邊以無彼福聚分別自性故隋本云即非福德聚論云以無彼福聚故秦本云即非福德性論云無彼分別自性故青龍云約真諦理安立第一義故圭峯約勝義空經後句即論云若復説言是故如來説福德聚此遮損減邊青龍云據俗為資道圭峯云約世俗有則圭峯義引無著論文却云雖有天辨亦弗能救是福德乃牒前三千大千布施福德也偈云福不趣菩提顯下受持法及説二能趣菩提又云須知此之非字乃揀去之辭揀去住相布施者論自云即非是名遮增益損減邊何云揀住相福德也青龍乃唐初人也彼疏亦指無著七種義句中文今謂撿論無文者得非未善無著論意乎無著云此下第八為成熟衆生離十二障礙中為離捨衆生故既莊嚴佛土必不捨衆生令諸衆生了有為法如夢如幻於欲界舉甚大身者遣蕩相著以此成熟未成熟者非曰彼云莊嚴佛土至遣蕩相著者此非經論意也經意自謂菩薩不見自體為能度舉喻山王尚不應見其自體何況餘者無著自釋云如來説為非體者顯示法無我故彼體非體者顯示法體無生無作故却云莊嚴佛土等有類諺語認橘作火也若天親論以前莊嚴佛土屬諸所現以今此大身為淨土受樂報佛遣蕩相著離障斷疑意不同故佛不共力隨類各解兩論意別不可會同然受樂報佛者即十方淨土諸佛所現大身受安樂果報非此娑婆有九惱事昔人以此為實報身者非也非曰先明論意後顯其非論云聖人無為法得名是法不可取不可説須菩提遂疑菩薩莊嚴佛土受樂報佛有取如來先以佛土破之佛土有二種莊嚴一形相二第一義揀非形相故云諸佛無有莊嚴國土事次疑受樂報佛取自法王身如來以須彌山王鏡像義無取況諸佛自取法王身今云以前莊嚴佛土屬諸佛所現故又云諸佛所現大身受安樂果報揀非娑婆有九惱事得非認雞作鳳也須菩提譬如人身長大乃至無壽者云云淨覺疏亦不能盡偈文論意乃云人身長大者以法身無相故直作法身無相釋此大身稍有殽訛今此大身即大教説普現色身若以事驗即觀音妙音現十界身此猶説十界正報色身更須如華嚴説入無功用現十種身虗空大地無非大身不妨用大所依體大故彌勒偈云依彼法身佛故説大身喻此一住經如來説盡諸大菩薩入淨心地證道功德池深華大世人多以此經為繁若知意旨甚為簡要若不得彌勒二偈兩論伸釋此之經文幾乎陸沈非曰破淨覺直作法身無相釋此大身云不得彌勒二偈兩論伸釋此經幾乎陸沈以作色身事相十界正報為大身切非經論之意偈云依彼法身佛故説大身喻又云非身即是身是故説大身天親論云非身者無有諸相故大身者有真如體故無著云於彼身中安立非自非他故又云於此大身等中安立第一義則二偈兩論自云真如第一義不説十界之身幾乎陸沈之言似覺漏逗也如來五眼三智同體所以五眼不説即非三智中云皆為非心兼前五眼同體而遣蕩之非曰注述一端先須熟精文理然後操觚彌勒偈云雖不見諸法非無了境眼諸佛五種實以見彼顛倒云何五眼同體而遣蕩耶有謂無著論不妨有遣蕩之文論云何故不説眼即非也以一處住故見智淨後安立第一義故初亦得成就自不解論意唐青龍氤法師疏釋此論曰以後例前應言如來説肉眼即非肉眼是名肉眼由安立第一義故彼法無無實體故無如其名有自體故不言即非也又云遣三心者此非如來三心也經云爾所國土中所有衆生若干種心却云如來三智得非執石作珠也偈文且舉色聲約法揀情又偈後經文為前蕩法身識不能知又若執著如來因三十二相而得菩提者畢竟其相是色自性故復遮云莫作是念非曰彼意以法身色相俱是遣蕩偈後經文為遣蕩法身識不能知且無著論偈後經文自云不可以相成就得菩提等既云相成就是豈遣蕩法身耶所言法相者即非法相是名法相三句要之與楞嚴性覺妙明本覺明妙兩句修因證果立本歸源不離自性不動本來非曰楞嚴性覺妙明本覺明妙者是破執遣蕩之文耶非耶若言非者何以會同若言同者二義同否楞嚴性覺妙明等是法相耶以性為相不亦過乎金剛事苑此經自唐至本朝南北諸師撰述甚多南方學者盛行圭峯纂要所敘兩論密示潛通稍有眉目及其依十八住懸判然後用二十七疑科釋入文隨釋多用無著未免媕婀非曰此意始乎淨覺謂纂要有而不遵無時強用天台近代諸師俱取無著而棄逐天親且無著天親皆聖師也何取一捨一今圭峯雙用二論但前後別行却云有而不遵無而強用且大雲青龍諸師二論共解疑住難分故圭峯先約義句懸判後用斷疑科釋況立斷疑之名自大雲青龍諸師創立且非圭峯也聖人云有名無義廣引文釋有義無名莫知所以今以名管之使經中法義昭彰豈曰無而強用也問何不先用天親懸判後以無著釋義耶答以有傍正故且彌勒云及斷種種疑亦防生成心無著六種因緣一為斷疑故天親云自此已下一切修多羅示現斷生疑心則以斷疑為正淨覺雌黃未為得理然無著論本不全用彌勒之偈今淨覺用無著論釋經而全增彌勒偈文可謂不遵強用返歸若也今云入文隨釋多用無著未免媕婀者且如通論破圭峯引無著云是福德等謂檢論無文自公不善論意非圭峯之咎也豈謂媕婀況圭峯之材非君等希企所及耶幸勿造次此經梵文譯本元無分名大藏外盛行什譯有三十二分相傳是梁昭明太子作若依譯本不可參入奈何世所信向習誦便易存之亦可又云但如理實見應化非真兩分名目恐須互換非曰聖教東漸翻譯之後千聖不改易豈謂信向便易故得存之得非居心不淨強欲滓穢太清邪此經有發阿耨多羅三藐三菩提下合安心字而特闕之什師刪繁可略則略必非脫去非曰欲解一經須尋衆本別本俱有心字或有脫者刀筆之誤却云什師刪繁可略則略必非脫去率爾穿鑿良可悲夫三果不來應云而實無不來經本闕不字古來皆同不可擅加如春秋夏五不書月闕文非曰梵語阿那含此云不來亦云不還不來第三果名也何云不可檀加則知華梵未通且未明華梵遽爾操觚得非太早計邪靈幽素持此經暴終杳歸冥府引見令誦王曰勘少一節何貫華之線斷乎放還其本在濠州鍾離寺石上幽經七日乃蘇遂奏勑令添入六十二字淨覺將魏譯勘秦本謂少耳不知什師存略之意無著論科判是佛地心具足初以衆生為念處初發心住既以衆生為廣大所發心境以前顯後以後照前故所略之也如此意遠可謂譯主若專執什本固不可添入隨順世緣既而信向又不妨圓滿隋譯經之與論但不可擅加於什譯經本以入大藏若別行大藏之外可也非曰事苑何以得知佛地心具足中文即是前發心住中文故譯主略之耶又云以前顯後以後照前故可略之者且會通經意殆非賢首天台慈恩等諸大聖師其餘刀筆常材安可會釋且猶使蚊負山商蚷之河必不勝任矣又云但不可擅加以入大藏者若別行大藏之外可也經論譯畢頒行天下却有藏內藏外之異儻或有藏中將出或有新將入藏安可定分內外秦魏之本不同何以增加如魯論語二十篇齊論語二十二篇豈可以齊論增魯論中此經圭峯指為小般若如無著論前歸敬偈云此小金剛波羅蜜以如是名顯勢力此對大品般若為小般若天台家指涅槃為大經賢首家指華嚴為大經皆取經名末上一字稱之必無所對非曰圭峯何處指金剛為小般若但八部般若中有大品小品等未嘗指金剛為小般若又云皆取經名末上一字稱之者大藏內經末上有大字者一百餘本豈都稱大經耶賢首宗稱大經者自依龍樹指華嚴為大不思議經耳非公所謂也梵語佛陀此翻覺者知者了了覺知名為佛陀誰不覺知誰能覺知體同性遍一而已矣非曰梵語佛陀此翻覺者佛地論云能自開覺亦能開覺一切有情如睡夢覺如蓮華開正以有情為不覺顯佛能覺也若體同性遍如何揀凡聖因果之異也優樓頻螺迦葉伽耶迦葉那提迦葉舍利弗目犍連先並事火外道艱苦屢載都無所獲非曰舍利弗目犍連智度論云婆羅門子優婆低沙即舍利弗也離多即目連也遇馬勝比丘指見世尊二人俱詣佛所求索出家且非事火外道也有謂事苑引天台觀經疏何故不遵且智者宗承龍樹豈特遺大菩薩耶自不曉智者意幸請熟觀然亦小事儻有大節豈不誤聖師之意耶天竺垂足而食故食訖洗足非曰善見律云坐法有二一結跏趺坐二踞坐設則篇云踞坐者佛始成道受乳糜觀諸佛法皆著淨衣踞坐而食若有出家弟子應如是法踞坐制有九法一腳前却二闊腳三搖動四豎五交六垂七翹八纍腳九纍䏶並犯吉羅今云垂足而食者恐非佛意我相乃至壽者相相亦名見圭峯演無著論釋四種見相所迷有二迷識境起四見如小般若迷智境起四見如圓覺云云然此經既密示階差自有淺深亦通兩種迷智所起惑體不同無非我相非曰今觀此釋則知未嘗深考經意若以圓覺金剛二經對看自知識智不同淺深有異不應指金剛密示階差亦通二種然圭峯密示階差自説連綴次第故一十八住密示階差非約迷識迷智故謂階差幸勿胸臆即則有人問云此經多云即又多云則用此二字如何分別即不離於此也則由之於此也各隨文理語勢用之不同非曰近有蓮社淨樂居士張承宣跋云即則二字者謹按高麗太安六年以彼國之祖名稷故凡經史之字悉易即為則避嫌也至壽昌元年詔刊此經於大興王寺從沙門則瑜德詵之請仍還本文或傳至中國至有互寫然人有所問知與不知宜當實對何苦肆為穿鑿東方虗空乃至上下虗空一切大教多取虗空為喻以虗空清淨無礙性遍一切處故世間大地萬物皆有無礙性處名為虗空萬物非無礙性則不能有萬物用當其無礙處有萬物用今目前所見無物名為顯色有物名為形色虗空無礙無所不包形顯諸色非曰今經自將虗空無邊例顯無住相布施福德無邊却云大地萬物皆有無礙性處名為虗空等又云今目前所見無物名為顯色有物名為形色者語涉無稽也然百法論自云色有三種一顯色青黃赤白光影明暗等二形色長短方圓粗細高下等三表色行住坐臥屈伸取捨等論謂青黃赤白為顯色彼謂無物為顯色莫不與論成氷炭耶後五百歲圭峯引大集經證第五百歲淨覺引母論料揀以大集為正事苑云二老通經可謂大手於此名言尚昧元意按無著論云正法欲滅時者謂修行漸滅時也此甚分明指正法千年後五百歲對前為後中分二五若以大集為正恐違無著非曰此因淨覺援引毗尼母論料揀大集故生事苑之疣贅唐奘本云於當來世後時後分後五百歲正法將滅時魏本於未來世末世法欲滅時隋本亦同真諦本云於未來世後五十歲正法滅時什本云後五百歲新羅曉法師疏云所以諸本有不同者未必譯者有誤錯耳真諦本云五十歲者謂其人壽五十歲時此時正法千年已過故言正法滅時然此正像及與末法皆不同外道邪法依此而言通名正法後五百歲大集月藏分第五五百歲後當人壽五十歲時毗尼母論乃小乘論自説女人出家減正法五百年唐青龍疏云小乘不依五百為配但以一百而為分配今依大乘此經及法華佛藏經等皆言後五百歲以五百為分配也然大小經論不同如何以小乘論用證大乘經耶況慈恩清涼青龍元曉等諸大聖師皆云正當大集經月藏分最後五百歲將鄰鬪諍之時獨今異於諸大聖師良恐不勝任矣持戒修福者圭峯纂要云戒定也以修福屬定隋譯云有持戒修福智慧者無著論以三學釋故今謂什譯特略智慧為其上文帶後五百歲而來佛入滅後正法後五百歲戒定解脫多聞等什譯意高略而復周非曰前指母論自與天親論不相乳合天親云若未來惡世人不生信心若正法中豈曰未來惡世耶真諦曰於未來世後五十歲若正法中不應人壽五十歲也又出什譯好略智慧謂帶上五百歲來者若指上五百歲亦配屬顛倒也有謂魏本云持戒修福智慧下文亦有以此為實之言者却有兩智慧耶豈魏本無未來世末世耶斯言即當什本後五百歲若然者亦應兩重智慧也思之纂要之意非君等所知無法相亦無非法相法順菩提也非法逆菩提也非曰經意有無俱遣故法非法皆拂却云順菩提逆菩提得非認指作月乎所謂佛法者即非佛法此下經文以非蕩相蕩而復立故云是名若此文與下文忍辱波羅蜜蕩相而已無復立法勘同法義理必須通譯主所尚刪繁互顯故此略之非曰彼謂佛法者即非佛法已下經文皆蕩而復立例顯即非忍辱下亦有是名譯主尚略故略之也敢問譯主既尚刪略何不於經初但舉一兩處下皆略去何故獨於般若忍辱凡夫等處無是名之言若謂譯主互顯何不於他句互顯而獨於此文互顯有謂奘本俱有是名理必合有若此言者則知奘什之意俱未通曉儻或得暇宜更看讀當何名此經我等云何奉持楞嚴在正宗末圓覺在流通初尊者何故便請經名須知此中所請佛唱經名而復蕩相破執為令於信解地離外散亂或起如言執義為對治彼未來罪故如來於此為唱經名不妨其意已兼流通非曰此經隨執即破何必定在流通中前聞二種校量廣顯經勝故上座須菩提遂問法如是勝何以名目佛約能斷惑勝故立金剛般若之名又恐如言而執故云即非而云不妨其意已兼流通其言稍疏也五眼皆如來具故一眼即具五眼五眼無非一眼圭峯引古德天眼通非礙等然圭峯引此注釋佛具五眼恐未合經旨以佛所具不可偏局觀俗緣空非曰圭峯云前四在佛總名佛眼彌勒云諸佛五種實以見彼顛倒以顯佛有五種用欲彰用別故引古德頌以為料揀却云不可偏局若只就佛言安有異乎今觀俗緣空以彰用別事苑但知其一不睹其二見其外不識其內也乃至無有少法可得云云是故三世如來最後一分微細無明盡處始為究竟非曰須菩提自問如來不得阿耨菩提耶佛云如是乃至無有少法可得無著云為離有見過顯示菩提菩提道彼中無微塵許法有體天親又云無有一法可證名為阿耨菩提以顯法界平等無增減故佛説所證法無得不説能證人也如何却云三世如來最後微細無明耶經論無此得非教外別傳乎依高山寺宋版校合
